name: Build LGX

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build core portable LGX
        run: cd tictactoe && nix build '.#lgx-portable' --out-link result-lgx-portable

      - name: Build UI portable LGX
        run: cd tictactoe-ui-cpp && nix build '.#lgx-portable' --override-input tictactoe path:../tictactoe --out-link result-lgx-portable

      - name: Build QML UI portable LGX
        run: cd tictactoe-ui-qml && nix build '.#lgx-portable' --override-input tictactoe path:../tictactoe --out-link result-lgx-portable

      - name: Build core dev LGX
        run: cd tictactoe && nix build '.#lgx' --out-link result-lgx

      - name: Build UI dev LGX
        run: cd tictactoe-ui-cpp && nix build '.#lgx' --override-input tictactoe path:../tictactoe --out-link result-lgx

      - name: Build QML UI dev LGX
        run: cd tictactoe-ui-qml && nix build '.#lgx' --override-input tictactoe path:../tictactoe --out-link result-lgx

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp tictactoe/result-lgx-portable/logos-tictactoe-module-lib.lgx                   dist/logos-tictactoe-module-lib.lgx
          cp tictactoe-ui-cpp/result-lgx-portable/logos-tictactoe_ui_cpp-module-lib.lgx     dist/logos-tictactoe_ui_cpp-module-lib.lgx
          cp tictactoe-ui-qml/result-lgx-portable/logos-tictactoe_ui_qml-lib.lgx            dist/logos-tictactoe_ui_qml-lib.lgx
          cp tictactoe/result-lgx/logos-tictactoe-module-lib.lgx                            dist/logos-tictactoe-module-lib-dev.lgx
          cp tictactoe-ui-cpp/result-lgx/logos-tictactoe_ui_cpp-module-lib.lgx              dist/logos-tictactoe_ui_cpp-module-lib-dev.lgx
          cp tictactoe-ui-qml/result-lgx/logos-tictactoe_ui_qml-lib.lgx                     dist/logos-tictactoe_ui_qml-lib-dev.lgx
          ls -la dist/

      - name: Upload core portable LGX
        uses: actions/upload-artifact@v4
        with:
          name: logos-tictactoe-module-lib.lgx
          path: dist/logos-tictactoe-module-lib.lgx

      - name: Upload UI portable LGX
        uses: actions/upload-artifact@v4
        with:
          name: logos-tictactoe_ui_cpp-module-lib.lgx
          path: dist/logos-tictactoe_ui_cpp-module-lib.lgx

      - name: Upload QML UI portable LGX
        uses: actions/upload-artifact@v4
        with:
          name: logos-tictactoe_ui_qml-lib.lgx
          path: dist/logos-tictactoe_ui_qml-lib.lgx

      - name: Upload core dev LGX
        uses: actions/upload-artifact@v4
        with:
          name: logos-tictactoe-module-lib-dev.lgx
          path: dist/logos-tictactoe-module-lib-dev.lgx

      - name: Upload UI dev LGX
        uses: actions/upload-artifact@v4
        with:
          name: logos-tictactoe_ui_cpp-module-lib-dev.lgx
          path: dist/logos-tictactoe_ui_cpp-module-lib-dev.lgx

      - name: Upload QML UI dev LGX
        uses: actions/upload-artifact@v4
        with:
          name: logos-tictactoe_ui_qml-lib-dev.lgx
          path: dist/logos-tictactoe_ui_qml-lib-dev.lgx

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "logos-*.lgx"
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.lgx
          generate_release_notes: true
